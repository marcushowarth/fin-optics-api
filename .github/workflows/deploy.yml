name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:        # don't redeploy the app for doc/workflow-only changes
      - '**.md'
      - 'LICENSE'
      - '.github/**'

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPOSITORY: fin-optics
  IMAGE_TAG: ${{ github.sha }}
  HOST_PORT: "8082"          # Caddy proxies optics.howarth.eu/api -> 127.0.0.1:8082

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          # Configures ~/.m2/settings.xml with a 'github' server (matches the
          # pom repository id) so the native build can pull fin-model from
          # GitHub Packages. Credentials supplied via env in the build step.
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build native image + run native integration test
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}
        run: >
          mvn --batch-mode verify -Dnative
          -Dquarkus.native.container-build=true
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build -f src/main/docker/Dockerfile.native \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            docker stop fin-optics-api || true
            docker rm fin-optics-api || true
            docker run -d \
              --name fin-optics-api \
              --restart unless-stopped \
              -p 127.0.0.1:${{ env.HOST_PORT }}:8090 \
              -e APP_GIT_SHA=${{ github.sha }} \
              -e APP_BUILT_AT=$BUILT_AT \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            docker image prune -f"
          rm -f /tmp/deploy_key
