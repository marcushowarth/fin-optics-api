name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:        # don't redeploy the app for doc/workflow-only changes
      - '**.md'
      - 'LICENSE'
      - '.github/**'
  schedule:
    # Weekly redeploy to pick up the freshest fin-model-rpi/fin-model-planning
    # SNAPSHOT (fin-model refreshes ONS data on its own weekly schedule, see
    # fin-model's update-ons-data.yml). -U below forces the snapshot refetch.
    - cron: '0 7 * * 4'   # every Thursday, 07:00 UTC
  workflow_dispatch:     # manual trigger — needed since .github/** is push-ignored above,
                          # so changes to this very file (e.g. testing a caching tweak)
                          # can't self-trigger a run any other way

env:
  IMAGE: ghcr.io/marcushowarth/fin-optics
  IMAGE_TAG: ${{ github.sha }}
  HOST_PORT: "8082"          # Caddy proxies optics.howarth.eu/api -> 127.0.0.1:8082

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          # Configures ~/.m2/settings.xml with a 'github' server (matches the
          # pom repository id) so the native build can pull fin-model from
          # GitHub Packages. Credentials supplied via env in the build step.
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Resolve Mandrel builder image digest
        id: mandrel
        run: |
          DIGEST=$(docker manifest inspect quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25 | sha256sum | cut -d' ' -f1)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Cache Mandrel builder image
        id: cache-mandrel
        uses: actions/cache@v6
        with:
          path: /tmp/mandrel-image.tar
          key: mandrel-builder-jdk25-${{ steps.mandrel.outputs.digest }}

      - name: Load cached Mandrel builder image
        if: steps.cache-mandrel.outputs.cache-hit == 'true'
        run: docker load -i /tmp/mandrel-image.tar

      - name: Pull and cache Mandrel builder image
        if: steps.cache-mandrel.outputs.cache-hit != 'true'
        run: |
          docker pull quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25
          docker save quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25 -o /tmp/mandrel-image.tar

      - name: Build native image + run native integration test
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}
        run: >
          mvn --batch-mode verify -U -Dnative
          -Dquarkus.native.container-build=true
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25

      - name: Login to GHCR
        uses: docker/login-action@v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -f src/main/docker/Dockerfile.native \
            -t $IMAGE:$IMAGE_TAG .
          docker tag $IMAGE:$IMAGE_TAG $IMAGE:latest
          docker push $IMAGE:$IMAGE_TAG
          docker push $IMAGE:latest

      - name: Deploy to Hetzner
        run: |
          echo "${{ secrets.HETZNER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            deploy@${{ secrets.HETZNER_HOST }} \
            "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE }}:latest
            docker stop fin-optics-api || true
            docker rm fin-optics-api || true
            docker run -d \
              --name fin-optics-api \
              --restart unless-stopped \
              -p 127.0.0.1:${{ env.HOST_PORT }}:8090 \
              -e APP_GIT_SHA=${{ github.sha }} \
              -e APP_BUILT_AT=$BUILT_AT \
              ${{ env.IMAGE }}:latest
            docker image prune -f"
          rm -f /tmp/deploy_key

      - name: Health-check the freshly deployed container
        run: |
          echo "${{ secrets.HETZNER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          for i in $(seq 1 12); do
            if ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.HETZNER_HOST }} \
                "curl -sf -m 5 http://localhost:${{ env.HOST_PORT }}/q/health"; then
              echo "Healthy after $i attempt(s)."
              rm -f /tmp/deploy_key
              exit 0
            fi
            echo "Not up yet (attempt $i), retrying..."
            sleep 5
          done
          echo "Container never became healthy"
          rm -f /tmp/deploy_key
          exit 1
