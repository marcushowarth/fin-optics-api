quarkus.application.name=fin-optics-api
quarkus.http.port=8090

# Build/version info — surfaced at GET /api/version (the UI reads this).
# version comes from the Maven <version>; git-sha and built-at default to "dev"
# locally and are overridden in the container deploy via the APP_GIT_SHA /
# APP_BUILT_AT env vars (Quarkus maps APP_GIT_SHA -> app.git-sha automatically).
app.version=${quarkus.application.version:dev}
app.git-sha=dev
app.built-at=dev

# CORS — allowed front-end origins: local dev (Vite :5173) + production.
# Override at runtime if needed via QUARKUS_HTTP_CORS_ORIGINS.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,https://optics.howarth.eu
quarkus.http.cors.methods=GET,POST,OPTIONS
